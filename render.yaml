# Blueprint do Render — provisiona o backend Django + Postgres.
# Suba no dashboard: New → Blueprint → aponte para este repositório.
# Depois preencha no dashboard as variáveis marcadas com sync:false.

databases:
  - name: ftz-db
    databaseName: ftz
    user: ftz
    plan: basic-256mb   # o plano free expira em 30 dias; use pago para produção

services:
  - type: web
    name: ftz-api
    runtime: python
    plan: starter
    branch: main
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: /admin/login/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: ftz-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true          # Render gera uma chave forte
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "api.ftzait.com.br"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://api.ftzait.com.br,https://ftzait.com.br,https://www.ftzait.com.br"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://ftzait.com.br,https://www.ftzait.com.br"
      - key: FRONTEND_URL
        value: "https://ftzait.com.br"
      - key: BACKEND_URL
        value: "https://api.ftzait.com.br"
      # --- Email (SMTP) — preencher no dashboard ---
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "True"
      - key: DEFAULT_FROM_EMAIL
        value: "Faculdade de Teologia Zait <noreply@ftzait.com.br>"
      - key: ADMIN_EMAIL
        value: "secretaria@ftzait.com.br"
      # --- Asaas (produção) — preencher no dashboard ---
      - key: ASAAS_FAKE
        value: "False"
      - key: ASAAS_API_KEY
        sync: false
      - key: ASAAS_BASE_URL
        value: "https://api.asaas.com/v3"
      - key: ASAAS_WEBHOOK_TOKEN
        sync: false
      # --- Storage de mídia (S3/R2) — preencher no dashboard ---
      - key: USE_S3
        value: "True"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_CUSTOM_DOMAIN
        sync: false
      # --- Observabilidade (opcional) ---
      - key: SENTRY_DSN
        sync: false
