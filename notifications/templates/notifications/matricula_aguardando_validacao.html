{% extends 'notifications/base.html' %}
{% block conteudo %}
<h2 style="margin-top:0; color:#1f3a5f;">Matrícula aguardando validação</h2>
<p>Uma matrícula entrou no status <strong>AGUARDANDO_VALIDAÇÃO</strong> e precisa da sua análise.</p>
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:16px 0; font-size:14px;">
  <tr><td style="padding:4px 12px 4px 0; color:#888;">Candidato:</td><td><strong>{{ candidato_nome }}</strong></td></tr>
  <tr><td style="padding:4px 12px 4px 0; color:#888;">Curso:</td><td>{{ curso }}</td></tr>
  <tr><td style="padding:4px 12px 4px 0; color:#888;">Turma:</td><td>{{ turma }}</td></tr>
</table>
<p style="text-align:center; margin:24px 0;">
  <a href="{{ admin_url }}" style="background-color:#1f3a5f; color:#ffffff; text-decoration:none; padding:12px 28px; border-radius:6px; font-weight:bold; display:inline-block;">Abrir no Admin</a>
</p>
{% endblock %}
